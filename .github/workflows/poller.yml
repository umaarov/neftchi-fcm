name: FC Neftchi News Poller

on:
  schedule:
    - cron: '0 4,13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Create initial last_id.txt if missing
        run: touch last_id.txt

      - name: Run Watcher Script
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: php watcher.php

      - name: Commit and Push State
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_id.txt
          
          # This line checks if last_id.txt actually changed. If it did, it commits and pushes.
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update last news ID to prevent duplicates" && git push)